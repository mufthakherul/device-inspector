name: CI Core

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  core-checks:
    name: Lint, tests, schema, security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Format check
        run: black --check .

      - name: Ruff lint
        run: ruff check .

      - name: Unit tests with coverage
        run: pytest --cov=agent --cov-report=term --cov-report=xml --cov-fail-under=35

      - name: Validate sample report against schema
        run: python scripts/validate_report.py samples/sample_report.json schemas/report-schema-1.0.0.json

      - name: Security scan
        run: bandit -r agent/ -f txt
        continue-on-error: true
