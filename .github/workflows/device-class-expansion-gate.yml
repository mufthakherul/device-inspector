name: Device Class Expansion Gate

on:
    workflow_dispatch:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    validate-p6-device-class-expansion:
        name: Validate P6 multi-device expansion assets
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Validate P6 profiles/docs
              run: |
                  python tools/validate_p6_device_class_expansion.py --report test-output/p6-device-class-expansion-report.json

            - name: Upload P6 validation artifact
              uses: actions/upload-artifact@v4
              with:
                  name: p6-device-class-expansion
                  path: test-output/p6-device-class-expansion-report.json
                  retention-days: 30
