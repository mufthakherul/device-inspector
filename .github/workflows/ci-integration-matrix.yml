name: CI Integration Matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  os-smoke:
    name: OS smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run quick-mode sample smoke
        shell: python
        run: |
          import subprocess

          cmd = [
            "python",
            "-m",
            "agent.cli",
            "run",
            "--mode",
            "quick",
            "--output",
            "smoke-os",
            "--use-sample",
            "--no-auto-open",
            "--format",
            "txt",
          ]
          proc = subprocess.run(cmd, check=False)
          if proc.returncode not in (0, 10):
            raise SystemExit(proc.returncode)

      - name: Verify smoke artifacts
        shell: bash
        run: |
          test -f smoke-os/report.json
          test -f smoke-os/report.txt

  linux-container-smoke:
    name: Linux smoke (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu-24.04
            image: ubuntu:24.04
            install_cmd: apt-get update ; DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-pip python3-venv
          - distro: debian-12
            image: debian:12
            install_cmd: apt-get update ; DEBIAN_FRONTEND=noninteractive apt-get install -y python3 python3-pip python3-venv
          - distro: fedora-40
            image: fedora:40
            install_cmd: dnf install -y python3 python3-pip

    steps:
      - uses: actions/checkout@v4

      - name: Run sample quick-mode smoke in container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ matrix.image }} \
            /bin/sh -lc "${{ matrix.install_cmd }} ; python3 -m venv /tmp/inspecta-venv ; . /tmp/inspecta-venv/bin/activate ; python -m pip install --upgrade pip ; python -m pip install -r requirements.txt ; python -m agent.cli run --mode quick --output smoke-linux --use-sample --no-auto-open --format txt ; rc=$? ; if [ \"$rc\" -ne 0 ] && [ \"$rc\" -ne 10 ]; then exit $rc; fi"

      - name: Verify smoke artifact exists
        run: test -f smoke-linux/report.json
