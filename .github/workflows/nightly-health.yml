name: Nightly Health

on:
  schedule:
    - cron: "35 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-matrix:
    name: Nightly health (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: pytest -q

      - name: Smoke full-mode sample run
        run: python -m agent.cli run --mode full --output nightly-smoke --use-sample --no-auto-open

      - name: Verify smoke bundle
        run: python -m agent.cli verify nightly-smoke --json
